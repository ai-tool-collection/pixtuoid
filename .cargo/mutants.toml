# cargo-mutants config (see `just mutants`). Mutation testing injects bugs and
# checks the tests catch them — the "do your assertions have teeth?" dimension
# that line/region coverage can't see. Use the project's runner (nextest) and
# exclude paths where a surviving mutant is NOISE, not a real gap, so the
# advisory signal stays high.
test_tool = "nextest"

exclude_globs = [
    # Untestable painter / async + winit glue — these five are the painter files
    # codecov.yml ALSO ignores; no headless test can kill their mutants, so every
    # one "survives" = noise. The two ignore lists OVERLAP, not subset: codecov
    # also ignores crash/logging/sources_cli (pure helpers stay unit-tested —
    # sources_cli via the cli_json e2e — so their mutants stay IN), and this file
    # also excludes the pixtuoid-core probe files below. Edit shared entries together.
    "crates/pixtuoid/src/main.rs",
    "crates/pixtuoid/src/tui/mod.rs",
    "crates/pixtuoid/src/runtime/driver.rs",
    "crates/pixtuoid/src/floating/mod.rs",
    "crates/pixtuoid/src/floating/window.rs",
    # Timing / FFI liveness probes: their tests assert wall-clock + OS behavior and
    # flake under mutation load — a "survivor" here is a flaked test, not a missing
    # assertion (this repo is flake-averse; #352-#354).
    "crates/pixtuoid-core/src/source/exit_watch.rs",
    "crates/pixtuoid-core/src/source/fd_probe.rs",
    # cfg(windows)-gated: never COMPILED on the unix hosts that run mutants, so
    # the mutated code can't reach any test binary and every mutant "survives"
    # as pure cross-compile noise (10/10 in the 2026-07 full run). Real Windows
    # coverage lives in the windows-test CI job's actual test run.
    "crates/pixtuoid-core/src/source/hook/windows.rs",
]

exclude_re = [
    # Equivalent-mutant classes verified by hand in the 2026-07 survivor triage
    # (each re-confirmed surviving on current main, then proven UNOBSERVABLE —
    # not merely untested):
    #
    # ChildEndUnclaims prunes on `Instant::now()` deltas — `<` vs `<=` differs
    # only when two monotonic reads land on the same instant, which no
    # deterministic test can arrange (the non-boundary prune/dedupe behavior
    # IS pinned by unclaim.rs's unit tests).
    'unclaim\.rs.*replace < with <= in ChildEndUnclaims',
    # The unix hook-socket bind's `tmp.len() > 100` picks between two bind
    # strategies (temp-rename vs direct+chmod) whose end states are
    # byte-identical — the boundary is sun_path headroom, distinguishable only
    # by which syscall sequence ran, invisible to any external observation.
    'hook/unix\.rs.*replace > with >= in Listener::bind',
    # `pid_start_time_secs` is a cfg-twin pair (macOS proc_pidinfo / non-macOS
    # `None` fallback): on ANY host the OTHER platform's variant is compiled
    # out, so its mutants always "survive" — fn-level cross-compile noise
    # (the windows.rs class). BOTH variants are pinned by cfg-twin tests in
    # cc_probe.rs (`pid_start_time_is_plausible_epoch_seconds_for_own_process`
    # / `pid_start_time_is_deliberately_unavailable_off_macos`), which run on
    # their own platforms.
    'cc_probe\.rs.*replace pid_start_time_secs',
    # `plant_ground_in_bounds` selects which scatter plants the #566 connectivity
    # guard drops (aisle-resident sealers) vs the `plants.clear()` last resort.
    # Within the SWEPT space (narrow-band 32..=76 × {80,100,120,160} × seeds 0..11)
    # the mutant is UNOBSERVABLE: at every config where the guard fires (the
    # 59-60×160 single-pod-column seals) BOTH corridor plants are already aisle-
    # resident, so the targeted retain empties the list identically to clear-all,
    # and the configs that keep a plant (38-42×160) never seal. The targeted path
    # is NOT dead, though — `plants` can also carry meeting-room + Ficus plants
    # (compute.rs) that sit far from `cubicle_aisle`, so a seal involving one
    # (outside the swept space) is exactly where `plant_ground_in_bounds` protects
    # it from the clear-all sledgehammer: genuine future-proofing. The
    # never-ship-a-pocket invariant IS pinned (appliance_strip_not_sealed_at_a_
    # single_pod_band + the boundary scan), so only the unobservable culprit-vs-
    # blanket distinction survives — an equivalent mutant within reach today.
    'compute\.rs.*plant_ground_in_bounds',
]
