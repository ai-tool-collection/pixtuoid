version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5
    ignore:
      # objc2-app-kit MUST track winit's stack (see crates/pixtuoid/Cargo.toml):
      # winit 0.30.x still pulls 0.2.x on objc2 0.5.x, so a 0.3+ bump would build
      # a SECOND objc2 stack beside winit's AND break the activate API. Allow only
      # 0.2.x patch bumps until winit itself moves to objc2 0.6.
      - dependency-name: "objc2-app-kit"
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 5

  # The two Node projects previously had security ALERTS but no update PRs —
  # npm advisories surfaced with nothing offering the fix.
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    groups:
      # playwright + @playwright/test must bump together (version-locked pair)
      playwright:
        patterns: ["playwright", "@playwright/*"]
      site-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5
    ignore:
      # typescript major (→7) is peer-rejected by @astrojs/check (peers
      # typescript ^5||^6) and typescript-eslint (<6.1.0), so `npm ci` ERESOLVEs.
      # Stay on 6.x until the astro-check + eslint toolchain supports TS7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /integrations/raycast
    schedule:
      interval: weekly
    groups:
      raycast-deps:
        patterns: ["*"]
    open-pull-requests-limit: 5
    ignore:
      # @raycast/api peers @types/node EXACTLY (22.19.17 — Raycast's runtime is
      # Node 22); a major ahead of that types APIs the runtime doesn't have.
      # Bump only when @raycast/api's own peer pin moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # typescript major (→7) is peer-rejected by @raycast/eslint-config's
      # typescript-eslint (peers typescript <6.1.0), so `npm ci` ERESOLVEs. Stay
      # on 6.x until the eslint toolchain supports TS7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
