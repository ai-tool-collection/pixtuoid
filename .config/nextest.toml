[profile.default]
# Cap a hung test at 3×60s so a deadlock fails THAT test (named) and the rest
# still run, instead of the job-level timeout killing the whole run blind. Far
# above every real test (incl. the 200ms shim watchdog tests). NOT a retry —
# #161's no-retries stance is preserved (retries stays unset = 0). `ci` inherits.
slow-timeout = { period = "60s", terminate-after = 3 }

# Full failure set per CI run: don't stop at the first failing test — a red CI
# run should report every failure at once (one round-trip, not fix-push-refail).
# Local `just test` keeps the default fail-fast for fast iteration. Active today
# on the coverage job (`--profile ci`); windows-test joins via #214.
[profile.ci]
fail-fast = false

[profile.ci.junit]
path = "junit.xml"

# The shim latency tests assert wall-clock bounds on a CHILD PROCESS's
# spawn+exit; under the fully-parallel suite on a loaded machine, exec/dyld
# scheduling jitter alone can blow the bound (#161 — flaked at 1051/1052
# during a `just bump` preflight, passed 3/3 in isolation). Give them the
# machine to themselves; profiles inherit from default, so `ci` gets this
# too. Covers the Unix test and its two Windows twins (shim_pipe.rs).
# (Plain `cargo test` runs test binaries sequentially — never affected.)
[[profile.default.overrides]]
filter = 'test(_exits_zero_without_blocking) | test(_within_watchdog_bound)'
threads-required = "num-cpus"

# The `exit_watch::tests::live::*` tests spawn a real child, watch its pid via
# kqueue/pidfd, and assert the watcher THREAD wakes within LIVE_PID_DEADLINE (10s).
# That deadline is a liveness bound, not a latency one — but under the fully-
# parallel suite the watcher thread can be SCHEDULER-STARVED past it, and the
# `coverage` job's `cargo llvm-cov` instrumentation (~2-3× slower) makes the
# starvation likely: `drop_stops_cleanly` flaked there on main even AFTER #325
# widened the deadline 3s→10s (a deadline bump can't fix CPU contention). Same
# fix + same rationale as the shim block above — give them the machine so the
# watcher thread is never starved. NOT a retry (#161's no-retries stance holds);
# inherited by `ci`. The macOS/Linux `mod live` gate means Windows matches none.
[[profile.default.overrides]]
filter = 'test(exit_watch::tests::live)'
threads-required = "num-cpus"
